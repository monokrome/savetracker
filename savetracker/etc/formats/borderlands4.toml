[format]
name = "borderlands4"
display_name = "Borderlands 4"

[detect]
extensions = [".sav"]

[detect.platform.windows]
path_patterns = ["**/My Games/Borderlands 4/Saved/SaveGames/**/*.sav"]

[detect.platform.linux]
path_patterns = ["**/compatdata/*/pfx/**/Borderlands 4/**/*.sav"]

[[pipeline]]
type = "aes_ecb_decrypt"
key_hex = "35ec3377f35db0eabe6b83115403ebfb2725642ed549062905078bd60ba4a787"
key_transform = "xor_prefix"
key_transform_param = "steam_id"
key_transform_bytes = 8

[[pipeline]]
type = "pkcs7_unpad"

[[pipeline]]
type = "zlib_decompress"

[output]
format = "yaml"

[params.steam_id]
flag = "steam-id"
description = "Steam ID (64-bit decimal, find via Steam profile URL)"
required = true
extract_from_path = "**/SaveGames/{}/Profiles/**"
